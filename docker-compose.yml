services:
  # ============================================================
  # Frontend: Next.js + TypeScript
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - app-network

  # ============================================================
  # Backend: Node.js + TypeScript (REST API)
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/src/data:/app/src/data
    environment:
      - NODE_ENV=development
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
    networks:
      - app-network

# ============================================================
# ネットワーク
# ============================================================
networks:
  app-network:
    driver: bridge
